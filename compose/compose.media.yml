# =============================================================================
# Media Management & Streaming
# =============================================================================
#   docker compose -f compose/compose.yml -f compose/compose.vpn.yml \
#     -f compose/compose.download.yml -f compose/compose.media.yml up -d
# =============================================================================

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: 3

x-restart: &restart
  restart: unless-stopped

services:
  # ── Music Manager (Lidarr) ───────────────────────────────────────────
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    <<: [*restart, *logging]
    ports:
      - "8686:8686"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_DIR:-./config}/lidarr:/config
      - ${DATA_DIR:-./data}/media/music:/music
      - ${DATA_DIR:-./data}/torrents:/downloads
    networks:
      - internal
      - media
    depends_on:
      prowlarr:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8686/ping > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  # ── Soulseek ↔ Lidarr Bridge (Soularr) ───────────────────────────────
  soularr:
    image: mrusse08/soularr:latest
    <<: [*restart, *logging]
    environment:
      - LIDARR_URL=http://lidarr:8686
      - LIDARR_API_KEY=${LIDARR_API_KEY}
      - SLSKD_URL=http://slskd:5030
      - SLSKD_USERNAME=${SLSKD_USERNAME}
      - SLSKD_PASSWORD=${SLSKD_PASSWORD}
      - SOULARR_INTERVAL_MINUTES=30
    volumes:
      - ${CONFIG_DIR:-./config}/soularr:/config
      - ${DATA_DIR:-./data}/soulseek:/downloads
      - ${DATA_DIR:-./data}/media/music:/music
    networks:
      - internal
    depends_on:
      lidarr:
        condition: service_started
      slskd:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 60s
      timeout: 10s
      retries: 2
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  # ── Music Streaming (Navidrome) ──────────────────────────────────────
  navidrome:
    image: deluan/navidrome:latest
    <<: [*restart, *logging]
    ports:
      - "4533:4533"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - ND_LOGIN_ENABLED=${ND_LOGIN_ENABLED:-true}
      - ND_USERS=${ND_USERS}
      - ND_MUSICFOLDER=/music
      - ND_DATAFOLDER=/data
    volumes:
      - ${CONFIG_DIR:-./config}/navidrome:/data
      - ${DATA_DIR:-./data}/media/music:/music
    networks:
      - media
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4533/ping > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
