# =============================================================================
# VPN + Torrent Client
#   docker compose -f compose/compose.yml -f compose/compose.vpn.yml up -d
# =============================================================================

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: 3

x-restart: &restart
  restart: unless-stopped

services:
  # ── VPN Gateway (Gluetun) ─────────────────────────────────────────────
  # Routes qBittorrent traffic through WireGuard / OpenVPN.
  gluetun:
    image: qmcgaw/gluetun:latest
    <<: [*restart, *logging]
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE:-wireguard}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - WIREGUARD_DNS=${WIREGUARD_DNS}
      - SERVER_REGIONS=${SERVER_REGIONS}
      - OPENVPN_USER=${OPENVPN_USER:-}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD:-}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES:-}
    ports:
      # qBittorrent Web UI
      - "8080:8080"
      # qBittorrent torrenting ports
      - "6881:6881"
      - "6881:6881/udp"
    networks:
      - vpn
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    read_only: false

  # ── Torrent Client (qBittorrent) ──────────────────────────────────────
  # Shares Gluetun's network stack so all traffic routes through the VPN.
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    <<: [*restart, *logging]
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - ${CONFIG_DIR:-./config}/qbittorrent:/config
      - ${DATA_DIR:-./data}/torrents:/downloads
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
