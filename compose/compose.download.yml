# =============================================================================
# Download Services
# =============================================================================
#   docker compose -f compose/compose.yml -f compose/compose.vpn.yml \
#     -f compose/compose.download.yml up -d
# =============================================================================

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: 3

x-restart: &restart
  restart: unless-stopped

services:
  # ── Indexer Manager (Prowlarr) ────────────────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    <<: [*restart, *logging]
    ports:
      - "9696:9696"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${CONFIG_DIR:-./config}/prowlarr:/config
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9696/ping > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp

  # ── Soulseek Client (slskd) ───────────────────────────────────────────
  slskd:
    image: ghcr.io/slskd/slskd:latest
    <<: [*restart, *logging]
    ports:
      - "5030:5030"
      - "5000:5000"
    environment:
      - SLSKD_USERNAME=${SLSKD_USERNAME}
      - SLSKD_PASSWORD=${SLSKD_PASSWORD}
      - SLSKD_REMOTE_CONFIGURATION=true
    volumes:
      - ${CONFIG_DIR:-./config}/slskd:/app/config
      - ${DATA_DIR:-./data}/soulseek:/app/downloads
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5030/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
